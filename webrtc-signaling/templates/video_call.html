<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WebRTC Call</title>

<style>

body{
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:flex-start;
        background:#f0f0f0;
        margin:0;
        padding:20px;
        gap:20px;
    }

    video{
        width:90%;
        max-width:350px;
        background:black;
        border:2px solid black;
    }

    button{
        width:250px;
        height:70px;
        font-size:24px;
        z-index:9999;
        position:relative;
}

</style>

</head>
<body
style="
    margin:0;
    background:#111827;
    font-family:sans-serif;
    overflow:hidden;
"
>

<div
style="
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
"
>

<!-- Top Bar -->

<div
style="
    height:70px;
    background:#1f2937;
    color:white;
    display:flex;
    align-items:center;
    padding-left:30px;
    font-size:24px;
    font-weight:bold;
    border-bottom:1px solid #374151;
"
>
Secure Video Call
</div>

<!-- Main Video Area -->

<div
style="
    flex:1;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
"
>

<!-- Remote Video -->

<video
    id="remoteVideo"
    autoplay
    playsinline
    style="
        width:100%;
        height:100%;
        object-fit:contain;
        background:black;
    "
></video>

<!-- Local Preview -->

<video
    id="localVideo"
    autoplay
    playsinline
    muted
    style="
        position:absolute;
        bottom:20px;
        right:20px;
        width:240px;
        height:160px;
        object-fit:cover;
        border-radius:12px;
        border:2px solid white;
        background:black;
    "
></video>

</div>

<!-- Bottom Controls -->

<div
style="
    height:100px;
    background:#1f2937;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
"
>

<button
onclick="startCall()"
style="
    width:140px;
    height:55px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
"
>
Start Call
</button>

<button
onclick="toggleMute()"
style="
    width:120px;
    height:55px;
    border:none;
    border-radius:10px;
    background:#374151;
    color:white;
    font-size:16px;
    cursor:pointer;
"
>
Mute
</button>

<button
onclick="toggleVideo()"
style="
    width:120px;
    height:55px;
    border:none;
    border-radius:10px;
    background:#374151;
    color:white;
    font-size:16px;
    cursor:pointer;
"
>
Video
</button>

</div>

</div>

</body>

<script>

const roomName = "testroom";

const localVideo = document.getElementById("localVideo");
const remoteVideo = document.getElementById("remoteVideo");

let localStream;
let pc;

function toggleMute() {

    localStream.getAudioTracks().forEach(track => {
        track.enabled = !track.enabled;
    });
}

function toggleVideo() {

    localStream.getVideoTracks().forEach(track => {
        track.enabled = !track.enabled;
    });
}

const socket = new WebSocket(
    'wss://' + window.location.host +
    '/ws/call/' + roomName + '/'
);

socket.onopen = () => {
    console.log("WebSocket connected");
};

async function init() {

    localStream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
    });

    localVideo.srcObject = localStream;

    console.log("Local stream ready");
}

init();

function createPeerConnection() {

    pc = new RTCPeerConnection({
        iceServers: [
            {
                urls: "stun:stun.l.google.com:19302"
            }
        ]
    });

    pc.onconnectionstatechange = () => {

        console.log(
            "CONNECTION STATE:",
            pc.connectionState
        );
    };

    pc.oniceconnectionstatechange = () => {

        console.log(
            "ICE STATE:",
            pc.iceConnectionState
        );
    };

    localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
    });

    pc.ontrack = (event) => {

        console.log("REMOTE TRACK");

        remoteVideo.srcObject = event.streams[0];

        remoteVideo.play()
        .then(() => {
            console.log("Remote video playing");
        })
        .catch(err => {
            console.log("Play error:", err);
        });
    };

    pc.onicecandidate = (event) => {

        console.log("LOCAL CANDIDATE:", event.candidate);

        if (event.candidate) {

            socket.send(JSON.stringify({
                type: "candidate",
                candidate: {
                    candidate: event.candidate.candidate,
                    sdpMid: event.candidate.sdpMid,
                    sdpMLineIndex: event.candidate.sdpMLineIndex
                }
            }));
        }
    };
}

async function startCall() {

    createPeerConnection();

    const offer = await pc.createOffer();

    await pc.setLocalDescription(offer);

    socket.send(JSON.stringify({
        type: "offer",
        offer: offer
    }));

    console.log("Offer sent");
}

socket.onmessage = async (event) => {

    const data = JSON.parse(event.data);

    console.log("MESSAGE:", data);

    if (data.type === "offer") {

        if (!pc) {
            createPeerConnection();
        }

        await pc.setRemoteDescription(
            new RTCSessionDescription(data.offer)
        );

        const answer = await pc.createAnswer();

        await pc.setLocalDescription(answer);

        socket.send(JSON.stringify({
            type: "answer",
            answer: answer
        }));

        console.log("Answer sent");
    }

    else if (data.type === "answer") {

        await pc.setRemoteDescription(
            new RTCSessionDescription(data.answer)
        );

        console.log("Answer received");
    }

    else if (data.type === "candidate") {

        if (pc) {

            try {

                console.log("ADDING CANDIDATE:", data.candidate);

                await pc.addIceCandidate(
                    new RTCIceCandidate(data.candidate)
                );

                console.log("Candidate success");

            } catch(err) {

                console.error("Candidate error:", err);
            }

            console.log("Candidate added");
        }
    }
};

</script>
</html>
